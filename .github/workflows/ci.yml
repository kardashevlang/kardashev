name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Manual anonymous clone — bypasses actions/checkout entirely. The
      # GITHUB_TOKEN-based fetch that actions/checkout performs returns 403
      # in this repo's workflow context (suspected new-account / new-repo
      # token-issuance issue). Anonymous git clone of a public repo should
      # not require any credential at all.
      - name: Clone repo (anonymous)
        shell: bash
        run: |
          set -euo pipefail
          # For a `pull_request` event, $GITHUB_REF_NAME is the synthetic
          # `<PR#>/merge` ref, which is not a cloneable branch — clone the PR's
          # HEAD branch instead. For a `push` event $GITHUB_HEAD_REF is empty,
          # so we fall back to $GITHUB_REF_NAME (the pushed branch, e.g. main).
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          echo "Cloning branch: $REF"
          git clone --depth 1 -b "$REF" \
            "https://github.com/$GITHUB_REPOSITORY.git" .
          echo "--- workspace contents ---"
          ls -la

      # The kardashev toolchain is plain Rust (std only, zero crates) and shells
      # out to the system C compiler for its backend. Both Rust and a C compiler
      # are preinstalled on GitHub-hosted runners; we just confirm they exist.
      - name: Toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          rustc --version
          cargo --version
          if command -v cc >/dev/null 2>&1; then cc --version | head -1
          elif command -v clang >/dev/null 2>&1; then clang --version | head -1
          elif command -v gcc >/dev/null 2>&1; then gcc --version | head -1
          else echo "no C compiler found" >&2; exit 1; fi

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --workspace -- --nocapture

      # Smoke-test the real toolchain end-to-end: scaffold a project, build it,
      # run it, and run its tests — exercising lex→parse→sema→emit-C→cc→native.
      - name: Toolchain smoke test
        shell: bash
        run: |
          set -euo pipefail
          KARD="$(pwd)/target/release/kard"
          "$KARD" version
          tmp="$(mktemp -d)"
          "$KARD" init "$tmp/demo"
          ( cd "$tmp/demo" && "$KARD" build && "$KARD" run && "$KARD" test )
          # Multi-target build graph (v0.122): two targets selected by name.
          mt="$(mktemp -d)"; mkdir -p "$mt/src"
          printf 'build {\n  exe "app"  { root = "src/app.ks"; }\n  exe "tool" { root = "src/tool.ks"; }\n}\n' > "$mt/build.ks"
          printf 'pub fn main() i32 { print(1); return 0; }\n' > "$mt/src/app.ks"
          printf 'pub fn main() i32 { print(2); return 0; }\n' > "$mt/src/tool.ks"
          ( cd "$mt" && "$KARD" build && [ "$("$KARD" run app)" = "1" ] && [ "$("$KARD" run tool)" = "2" ] )
          # Multi-file modules (v0.126): a root that @imports another file.
          md="$(mktemp -d)"
          printf 'pub fn triple(n: i32) i32 { return n * 3; }\n' > "$md/util.ks"
          printf '@import("util.ks");\npub fn main() i32 { print(triple(7)); return 0; }\n' > "$md/main.ks"
          ( cd "$md" && [ "$("$KARD" run main.ks)" = "21" ] )
          # Doc generation (v0.140): `kard doc` renders a public item + its `///`.
          dd="$(mktemp -d)"
          printf '/// Add two integers.\npub fn add(a: i32, b: i32) i32 { return a + b; }\npub fn main() i32 { return 0; }\n' > "$dd/lib.ks"
          "$KARD" doc "$dd/lib.ks" | grep -q 'fn add(a: i32, b: i32) i32'
          "$KARD" doc "$dd/lib.ks" | grep -q 'Add two integers.'
          # Standard library (v0.145): `@import("std")` resolves to the bundled lib.
          sd="$(mktemp -d)"
          printf '@import("std");\nconst L = ArrayList(i32);\npub fn main() i32 { var a: Allocator = c_allocator(); var l: L = L.init(a); l.push(a, imax(40, 2)); print(l.get(0)); l.deinit(a); return 0; }\n' > "$sd/m.ks"
          ( cd "$sd" && [ "$("$KARD" run m.ks)" = "40" ] )
          # I/O (v0.148): @readFile reads a file; @readLine reads piped stdin.
          iod="$(mktemp -d)"
          printf 'kardashev' > "$iod/data.txt"
          printf 'pub fn main() i32 { var a: Allocator = c_allocator(); var s: []u8 = @readFile(a, "%s/data.txt"); print(s.len); free(a, s); return 0; }\n' "$iod" > "$iod/rf.ks"
          ( cd "$iod" && [ "$("$KARD" run rf.ks)" = "9" ] )
          printf 'pub fn main() i32 { var a: Allocator = c_allocator(); var l: []u8 = @readLine(a); print(l.len); free(a, l); return 0; }\n' > "$iod/rl.ks"
          ( cd "$iod" && [ "$(printf "hello\nx\n" | "$KARD" run rl.ks)" = "5" ] )
          # String utilities (v0.149): std `str_concat` / `str_index_of`.
          su="$(mktemp -d)"
          printf '@import("std");\npub fn main() i32 { var a: Allocator = c_allocator(); var s: []u8 = str_concat(a, "foo", "bar"); print(s.len); print(str_index_of(s, 98)); free(a, s); return 0; }\n' > "$su/s.ks"
          ( cd "$su" && [ "$("$KARD" run s.ks | tr "\n" " ")" = "6 3 " ] )
          # Cross-compilation plumbing (v0.123): `targets` lists triples, and
          # `-target <host triple>` exercises clang's --target end to end (the
          # host triple always has its sysroot, so it links + runs).
          "$KARD" targets | grep -q x86_64
          if command -v clang >/dev/null 2>&1; then
            ht="$(clang -dumpmachine)"
            xc="$(mktemp -d)"
            printf 'pub fn main() i32 { print(7); return 0; }\n' > "$xc/m.ks"
            "$KARD" build "$xc/m.ks" -target "$ht" -o "$xc/m" && [ "$("$xc/m")" = "7" ]
          fi
